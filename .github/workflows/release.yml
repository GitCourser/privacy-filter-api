name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  BIN_NAME: privacy-filter-api
  CARGO_TERM_COLOR: always

jobs:
  build-release:
    name: Build ${{ matrix.package_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            package_name: privacy-filter-api-linux-x64
            archive_ext: tar.gz
          - os: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            package_name: privacy-filter-api-linux-arm64
            archive_ext: tar.gz
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            package_name: privacy-filter-api-windows-x64
            archive_ext: zip
          - os: windows-11-arm
            target: aarch64-pc-windows-msvc
            package_name: privacy-filter-api-windows-arm64
            archive_ext: zip
          - os: macos-15
            target: x86_64-apple-darwin
            package_name: privacy-filter-api-macos-x64
            archive_ext: tar.gz
          - os: macos-15
            target: aarch64-apple-darwin
            package_name: privacy-filter-api-macos-arm64
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry and build output
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build binary
        shell: bash
        run: cargo build --release --locked --target "${{ matrix.target }}"

      - name: Prepare package directory
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.package_name }}"
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            cp "target/${{ matrix.target }}/release/${BIN_NAME}.exe" "dist/${{ matrix.package_name }}/${BIN_NAME}.exe"
          else
            cp "target/${{ matrix.target }}/release/${BIN_NAME}" "dist/${{ matrix.package_name }}/${BIN_NAME}"
            chmod +x "dist/${{ matrix.package_name }}/${BIN_NAME}"
          fi
          cp .env.example README.md "dist/${{ matrix.package_name }}/"

      - name: Create tar.gz release package
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          set -euo pipefail
          tar -czf "dist/${{ matrix.package_name }}.tar.gz" -C dist "${{ matrix.package_name }}"

      - name: Create zip release package
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/${{ matrix.package_name }}" -DestinationPath "dist/${{ matrix.package_name }}.zip" -Force

      - name: Upload package to tag release
        uses: softprops/action-gh-release@v3
        with:
          files: dist/${{ matrix.package_name }}.${{ matrix.archive_ext }}
          fail_on_unmatched_files: true
          generate_release_notes: ${{ matrix.target == 'x86_64-unknown-linux-gnu' }}

  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-24.04
    needs: build-release
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize Docker image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
